<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Senasu</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;}
body{
  background:linear-gradient(160deg,#fff0f6 0%,#fff 45%,#f8e8ff 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:Georgia,serif;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative;
}
h1{
  font-family:'Pinyon Script',cursive;
  font-size:clamp(48px,12vw,72px);
  background:linear-gradient(135deg,#FF69B4,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.1;margin-bottom:4px;
}
#char{transition:none;}
.bubble{
  background:white;border-radius:22px;padding:14px 28px;
  margin-top:8px;box-shadow:0 6px 28px #FFB6C144;
  border:2.5px solid #FFB6C1;position:relative;
  min-width:150px;text-align:center;
  animation:popIn .3s ease;
  font-style:italic;font-size:21px;color:#555;
  min-height:54px;display:flex;align-items:center;justify-content:center;
}
.bubble::before{
  content:'';position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:9px solid transparent;border-right:9px solid transparent;
  border-bottom:14px solid #FFB6C1;
}
.hint{margin-top:10px;font-size:13px;color:#e0a0c0;font-style:italic;}
.orb{position:absolute;border-radius:50%;
  background:linear-gradient(135deg,#FFB6C1,#e0aaff);
  opacity:.1;pointer-events:none;}
.particle{position:absolute;font-size:20px;pointer-events:none;z-index:10;
  animation:floatUp .95s ease-out forwards;}
@keyframes floatUp{0%{transform:translateY(0) scale(.8);opacity:1;}100%{transform:translateY(-110px) scale(1.4);opacity:0;}}
@keyframes idle{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes bop{0%,100%{transform:translateY(0) rotate(0deg);}30%{transform:translateY(-24px) rotate(-6deg);}65%{transform:translateY(-12px) rotate(5deg);}}
@keyframes popIn{0%{transform:scale(.5);opacity:0;}65%{transform:scale(1.1);opacity:1;}100%{transform:scale(1);}}
.idle{animation:idle 3.5s ease-in-out infinite;}
.bop{animation:bop .5s ease-in-out !important;}
</style>
</head>
<body>

<!-- bg orbs -->
<div class="orb" style="width:90px;height:90px;top:5%;left:5%;"></div>
<div class="orb" style="width:55px;height:55px;top:78%;left:8%;"></div>
<div class="orb" style="width:75px;height:75px;top:10%;left:82%;"></div>
<div class="orb" style="width:50px;height:50px;top:80%;left:80%;"></div>

<h1>Senasu</h1>

<div id="char" class="idle">
<svg id="face" viewBox="0 0 160 220" width="160" height="220" style="display:block;overflow:visible;">
  <defs>
    <radialGradient id="fg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFB6C1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dg" cx="50%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#ffcfe0"/>
      <stop offset="100%" stop-color="#ff85b3"/>
    </radialGradient>
    <radialGradient id="wg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffd6e8" stop-opacity="0.4"/>
    </radialGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- wings -->
  <ellipse cx="42" cy="120" rx="34" ry="20" fill="url(#wg)" stroke="#ffb6d9" stroke-width="1" transform="rotate(-30 42 120)" opacity="0.85"/>
  <ellipse cx="38" cy="138" rx="24" ry="14" fill="url(#wg)" stroke="#ffb6d9" stroke-width="1" transform="rotate(-20 38 138)" opacity="0.7"/>
  <ellipse cx="118" cy="120" rx="34" ry="20" fill="url(#wg)" stroke="#ffb6d9" stroke-width="1" transform="rotate(30 118 120)" opacity="0.85"/>
  <ellipse cx="122" cy="138" rx="24" ry="14" fill="url(#wg)" stroke="#ffb6d9" stroke-width="1" transform="rotate(20 122 138)" opacity="0.7"/>
  <!-- dress -->
  <path d="M 58 118 Q 40 145 38 185 Q 55 195 80 196 Q 105 195 122 185 Q 120 145 102 118 Z" fill="url(#dg)"/>
  <path d="M 65 125 Q 55 150 52 180" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <ellipse cx="40" cy="192" rx="5" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="50" cy="192" rx="5" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="60" cy="192" rx="5" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="70" cy="192" rx="5" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="80" cy="192" rx="5" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="90" cy="192" rx="5" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="100" cy="192" rx="5" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="110" cy="192" rx="5" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="120" cy="192" rx="5" ry="4" fill="white" opacity="0.5"/>
  <!-- arms -->
  <path d="M 62 128 Q 40 138 36 152" stroke="#ffcfe0" stroke-width="10" fill="none" stroke-linecap="round"/>
  <circle cx="34" cy="154" r="6" fill="#ffcfe0"/>
  <path d="M 98 128 Q 120 138 124 152" stroke="#ffcfe0" stroke-width="10" fill="none" stroke-linecap="round"/>
  <circle cx="126" cy="154" r="6" fill="#ffcfe0"/>
  <!-- neck -->
  <rect x="70" y="105" width="20" height="16" rx="8" fill="#ffcfe0"/>
  <!-- head -->
  <ellipse cx="80" cy="82" rx="38" ry="36" fill="#ffcfe0"/>
  <ellipse cx="80" cy="82" rx="38" ry="36" fill="url(#fg)"/>
  <!-- hair -->
  <ellipse cx="80" cy="50" rx="36" ry="18" fill="#d63384"/>
  <ellipse cx="46" cy="72" rx="10" ry="22" fill="#d63384"/>
  <ellipse cx="114" cy="72" rx="10" ry="22" fill="#d63384"/>
  <ellipse cx="80" cy="47" rx="28" ry="14" fill="#e75fa0"/>
  <ellipse cx="68" cy="50" rx="8" ry="4" fill="white" opacity="0.25" transform="rotate(-20 68 50)"/>
  <!-- ears -->
  <circle cx="43" cy="82" r="8" fill="#ffcfe0"/>
  <circle cx="117" cy="82" r="8" fill="#ffcfe0"/>
  <circle cx="43" cy="82" r="4" fill="#FF85A1" opacity="0.3"/>
  <circle cx="117" cy="82" r="4" fill="#FF85A1" opacity="0.3"/>
  <!-- cheeks -->
  <ellipse cx="58" cy="92" rx="11" ry="7" fill="#FF85A1" opacity="0.25"/>
  <ellipse cx="102" cy="92" rx="11" ry="7" fill="#FF85A1" opacity="0.25"/>
  <!-- eyes (normal) -->
  <g id="eyes-normal">
    <ellipse cx="68" cy="80" rx="6" ry="7" fill="#9c2755"/>
    <ellipse cx="92" cy="80" rx="6" ry="7" fill="#9c2755"/>
    <circle cx="70" cy="77" r="2" fill="white" opacity="0.7"/>
    <circle cx="94" cy="77" r="2" fill="white" opacity="0.7"/>
    <line x1="63" y1="74" x2="61" y2="71" stroke="#9c2755" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="68" y1="73" x2="68" y2="70" stroke="#9c2755" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="73" y1="74" x2="75" y2="71" stroke="#9c2755" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="87" y1="74" x2="85" y2="71" stroke="#9c2755" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="92" y1="73" x2="92" y2="70" stroke="#9c2755" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="97" y1="74" x2="99" y2="71" stroke="#9c2755" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- eyes (blink) -->
  <g id="eyes-blink" style="display:none">
    <path d="M 62 80 Q 68 77 74 80" stroke="#9c2755" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M 86 80 Q 92 77 98 80" stroke="#9c2755" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- eyes (happy) -->
  <g id="eyes-happy" style="display:none">
    <path d="M 62 81 Q 68 73 74 81" stroke="#9c2755" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <path d="M 86 81 Q 92 73 98 81" stroke="#9c2755" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  </g>
  <!-- nose -->
  <ellipse cx="80" cy="88" rx="3" ry="2" fill="#FF85A1" opacity="0.35"/>
  <!-- mouth -->
  <path d="M 68 96 Q 80 106 92 96" stroke="#9c2755" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- bow -->
  <path d="M 60 52 Q 68 44 76 52 Q 68 58 60 52 Z" fill="#ff4d94" opacity="0.9"/>
  <path d="M 100 52 Q 92 44 84 52 Q 92 58 100 52 Z" fill="#ff4d94" opacity="0.9"/>
  <circle cx="80" cy="52" r="5" fill="#ff4d94"/>
  <!-- wand -->
  <line x1="128" y1="150" x2="142" y2="136" stroke="#d4a0ff" stroke-width="3" stroke-linecap="round"/>
  <polygon points="142,128 139,136 147,136" fill="#f0c0ff"/>
  <circle cx="142" cy="128" r="5" fill="#e080ff"/>
  <text x="144" y="120" font-size="9" opacity="0.8">✦</text>
  <text x="8" y="55" font-size="11" opacity="0.7">✦</text>
  <text x="140" y="65" font-size="9" opacity="0.6">✦</text>
</svg>
</div>

<div class="bubble" id="bubble">
  <span class="hint">üstüme bas, konuşayım! 🌸</span>
</div>

<script>
const dialogues=[
  {show:"Evet! 🌸",        say:"Evet"},
  {show:"Hayır... 🙈",     say:"Hayır"},
  {show:"Bilmiyorum! 🤷",  say:"Bilmiyorum"},
  {show:"Tabii ki! 💗",    say:"Tabii ki"},
  {show:"Hiç sanmıyorum.", say:"Hiç sanmıyorum"},
  {show:"Oooh! ✨",        say:"Ooh"},
  {show:"Belki?",          say:"Belki"},
  {show:"Kesinlikle! 🎀",  say:"Kesinlikle"},
  {show:"Yayyyy! 🎉",      say:"Yay"},
  {show:"Hmm...",          say:null},
  {show:"Olmaz olmaz!",    say:"Olmaz olmaz"},
  {show:"Tamam! 🌸",       say:"Tamam"},
  {show:"İstemiyorum.",    say:"İstemiyorum"},
  {show:"Çok güzel! ⭐",   say:"Çok güzel"},
  {show:"Eh işte.",        say:"Eh işte"},
];
const sounds=[
  [523,659,784],[659,523,440],[440,523,440],[523,659,784,1047],
  [392,440,392],[784,880,1047],[523,587,523],[659,784,880,1047],
  [523,659,784,1047],[440,392,440],[392,330,392],[523,659,784],
  [330,294,330],[784,880,1047],[440,523,440],
];
const emojis=["🌸","💗","✨","⭐","🎀","🪄"];

let audioCtx=null;
function getCtx(){
  if(!audioCtx||audioCtx.state==="closed")
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
  return audioCtx;
}
function playTone(notes){
  try{
    const ctx=getCtx();
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator(),g=ctx.createGain();
      osc.connect(g);g.connect(ctx.destination);
      osc.type="sine";osc.frequency.value=freq;
      const t=ctx.currentTime+i*0.11;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.12,t+0.04);
      g.gain.linearRampToValueAtTime(0,t+0.15);
      osc.start(t);osc.stop(t+0.17);
    });
  }catch(e){}
}
function speak(text){
  if(!text)return;
  try{
    const s=window.speechSynthesis;
    s.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="tr-TR";u.pitch=1.45;u.rate=0.9;u.volume=1;
    const voices=s.getVoices();
    const tr=voices.find(v=>v.lang&&v.lang.startsWith("tr"));
    if(tr)u.voice=tr;
    s.speak(u);
  }catch(e){}
}
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

const charEl=document.getElementById("char");
const bubbleEl=document.getElementById("bubble");
const eyesNormal=document.getElementById("eyes-normal");
const eyesBlink=document.getElementById("eyes-blink");
const eyesHappy=document.getElementById("eyes-happy");

let used=[], current=null, typTimer=null, started=false;

// blink
setInterval(()=>{
  eyesNormal.style.display="none";
  eyesBlink.style.display="block";
  eyesHappy.style.display="none";
  setTimeout(()=>{
    eyesBlink.style.display="none";
    eyesNormal.style.display="block";
  },130);
},3000);

// happy eyes
setInterval(()=>{
  eyesNormal.style.display="none";
  eyesBlink.style.display="none";
  eyesHappy.style.display="block";
  setTimeout(()=>{
    eyesHappy.style.display="none";
    eyesNormal.style.display="block";
  },700);
},4500);

function typeText(text){
  clearInterval(typTimer);
  bubbleEl.textContent="";
  let i=0;
  typTimer=setInterval(()=>{
    i++;
    bubbleEl.textContent=text.slice(0,i);
    if(i>=text.length) clearInterval(typTimer);
  },55);
}

function spawnParticles(){
  for(let i=0;i<6;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.textContent=emojis[i];
    const x=(Math.random()-.5)*220;
    p.style.left=`calc(50% + ${x}px)`;
    p.style.top="42%";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),950);
  }
}

function bounce(){
  charEl.classList.remove("idle","bop");
  void charEl.offsetWidth;
  charEl.classList.add("bop");
  setTimeout(()=>{
    charEl.classList.remove("bop");
    charEl.classList.add("idle");
  },500);
}

function tap(){
  let pool=dialogues.map((_,i)=>i).filter(i=>!used.includes(i)&&i!==current);
  if(!pool.length) pool=dialogues.map((_,i)=>i).filter(i=>i!==current);
  const next=pool[Math.floor(Math.random()*pool.length)];
  used=[...used.slice(-6),next];
  current=next;

  playTone(sounds[next]);
  speak(dialogues[next].say);
  bounce();
  spawnParticles();

  // reset bubble animation
  bubbleEl.style.animation="none";
  void bubbleEl.offsetWidth;
  bubbleEl.style.animation="popIn .3s ease";

  typeText(dialogues[next].show);
  started=true;
}

document.body.addEventListener("click", tap);
document.body.addEventListener("touchend", e=>{ e.preventDefault(); tap(); }, {passive:false});
</script>
</body>
</html>
